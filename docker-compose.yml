services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: foresight-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/.venv
      - ./knowledge-graph:/app/knowledge-graph # RDF output from seed_rdf_graph.py
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - graphdb

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: foresight-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  postgres:
    image: postgis/postgis:16-3.4
    container_name: postgres
    environment:
      POSTGRES_DB: foresight
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"

  graphdb:
    image: ontotext/graphdb:10.8.1
    container_name: graphdb
    ports:
      - "7200:7200"
    volumes:
      - graphdb_data:/opt/graphdb/home

volumes:
  postgres_data:
  graphdb_data:
